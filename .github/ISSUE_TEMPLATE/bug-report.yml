name: "🐛 Bug Report"
description: "Something is broken"
labels: ["type: bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "Clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Additional context"
      description: "Screenshots, component names, relevant files"
