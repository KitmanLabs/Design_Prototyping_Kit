name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: StyleLint
        run: npm run lint:css

      - name: Design system validation
        run: npm run validate-design-system

      - name: Build
        env:
          VITE_PUBLIC_BUILDER_KEY: ${{ secrets.VITE_PUBLIC_BUILDER_KEY }}
          VITE_MUI_X_LICENSE_KEY: ${{ secrets.VITE_MUI_X_LICENSE_KEY }}
        run: npm run build
